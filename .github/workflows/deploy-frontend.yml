name: Deploy Frontend to S3

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  VITE_API_BASE_URL: https://l7xnpjosjvyrlx55dxrwdvx5g40okeyd.lambda-url.us-east-1.on.aws
  S3_BUCKET: airbrake
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install shared package
        working-directory: shared
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
        run: npm run build

      - name: Verify Lambda URL in bundle
        working-directory: frontend
        run: |
          grep -r "l7xnpjosjvyrlx55dxrwdvx5g40okeyd" dist/ \
            && echo "✅ Lambda URL found in bundle" \
            || (echo "❌ Lambda URL NOT found"; exit 1)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync to S3 (assets with long cache)
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"

      - name: Upload index.html (no cache)
        working-directory: frontend
        run: |
          aws s3 cp dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
          echo "✅ Frontend deployed to s3://${{ env.S3_BUCKET }}"

      - name: Verify S3 website
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ env.S3_BUCKET }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com)
          echo "S3 website: HTTP $STATUS"
          [ "$STATUS" = "200" ] \
            && echo "✅ Frontend live" \
            || echo "⚠️ S3 returned $STATUS (check bucket policy)"
