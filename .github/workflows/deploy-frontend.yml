name: Deploy Frontend to S3

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: # allow manual trigger

jobs:
  deploy:
    name: Build & Deploy to S3
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── 3. Install shared dependency ──────────────────────────────────────────
      - name: Install shared package
        working-directory: shared
        run: npm ci --ignore-scripts

      # ── 4. Install frontend dependencies ─────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── 5. Build frontend (Lambda URL baked in via VITE_API_BASE_URL) ─────────
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://l7xnpjosjvyrlx55dxrwdvx5g40okeyd.lambda-url.us-east-1.on.aws
        run: npm run build

      # ── 6. Verify the Lambda URL is in the bundle ─────────────────────────────
      - name: Verify Lambda URL in bundle
        working-directory: frontend
        run: |
          if grep -r "l7xnpjosjvyrlx55dxrwdvx5g40okeyd" dist/; then
            echo "✅ Lambda URL found in bundle"
          else
            echo "❌ Lambda URL NOT found in bundle"
            exit 1
          fi

      # ── 7. Configure AWS credentials ──────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── 8. Deploy to S3 ───────────────────────────────────────────────────────
      - name: Sync frontend to S3
        working-directory: frontend
        run: |
          aws s3 sync dist/ s3://airbrake \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html"

          # index.html must not be cached — always serve fresh
          aws s3 cp dist/index.html s3://airbrake/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          echo "✅ Frontend deployed to s3://airbrake"

      # ── 9. Verify frontend is accessible ──────────────────────────────────────
      - name: Verify S3 website
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://airbrake.s3-website-us-east-1.amazonaws.com)
          echo "S3 website HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Frontend is live at http://airbrake.s3-website-us-east-1.amazonaws.com"
          else
            echo "⚠️  S3 returned $STATUS (check bucket policy / website hosting settings)"
          fi
