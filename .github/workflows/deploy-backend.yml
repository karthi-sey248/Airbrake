name: Deploy Backend to Lambda

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  LAMBDA_FUNCTION_NAME: l7xnpjosjvyrlx55dxrwdvx5g40okeyd
  LAMBDA_HANDLER: dist/lambda.lambdaHandler
  DSQL_ENDPOINT: ezt2bkam5s4kjre73r25easkcu.dsql.us-east-1.on.aws
  DSQL_REGION: us-east-1
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Build & Deploy to Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install shared package
        working-directory: shared
        run: npm ci --ignore-scripts

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Build TypeScript
        working-directory: backend
        run: npx tsc

      - name: Verify Lambda exports
        working-directory: backend
        run: |
          node -e "const h=require('./dist/lambda.js'); if(!h.lambdaHandler){process.exit(1);} console.log('OK exports:', Object.keys(h).join(', '));"

      - name: Create deployment zip
        working-directory: backend
        run: |
          zip -r lambda-deploy.zip dist/ node_modules/ package.json
          echo "Zip size: $(du -sh lambda-deploy.zip | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload zip to Lambda
        working-directory: backend
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda-deploy.zip \
            --output json | jq '{FunctionName,CodeSize,LastModified}'

      - name: Wait for code update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Set handler and runtime
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --handler ${{ env.LAMBDA_HANDLER }} \
            --runtime nodejs20.x \
            --timeout 30 \
            --memory-size 512 \
            --output json | jq '{Handler,Runtime,Timeout,MemorySize}'

      - name: Wait for config update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Set environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --environment "Variables={DSQL_ENDPOINT=${{ env.DSQL_ENDPOINT }},DSQL_REGION=${{ env.DSQL_REGION }},NODE_ENV=production}" \
            --output json | jq '.Environment.Variables | keys'

      - name: Wait for env update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Attach Aurora DSQL IAM policy to Lambda role
        run: |
          ROLE_NAME=$(aws lambda get-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query 'Role' --output text | cut -d'/' -f2)
          echo "Lambda execution role: $ROLE_NAME"

          cat > /tmp/dsql-policy.json << 'POLICY'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["dsql:DbConnectAdmin"],
                "Resource": "arn:aws:dsql:us-east-1:850995535850:cluster/ezt2bkam5s4kjre73r25easkcu"
              }
            ]
          }
          POLICY

          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "AuroraDSQLAccess" \
            --policy-document file:///tmp/dsql-policy.json

          echo "IAM policy attached"

      - name: Smoke test health endpoint
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ env.LAMBDA_FUNCTION_NAME }}.lambda-url.us-east-1.on.aws/api/health)
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Lambda is healthy"
          else
            echo "Lambda returned $STATUS — check CloudWatch logs"
            exit 1
          fi

      - name: Smoke test Aurora DSQL projects
        run: |
          BODY=$(curl -s \
            https://${{ env.LAMBDA_FUNCTION_NAME }}.lambda-url.us-east-1.on.aws/api/projects)
          echo "Projects: $BODY"
          COUNT=$(echo "$BODY" | jq 'length' 2>/dev/null || echo "0")
          if [ "$COUNT" -gt "0" ] 2>/dev/null; then
            echo "Aurora DSQL connected — $COUNT projects found"
          else
            echo "No projects returned — check Lambda CloudWatch logs for DB errors"
          fi
